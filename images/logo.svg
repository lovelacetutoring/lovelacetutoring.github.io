<svg width="1400" height="1400" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">

  <g transform="translate(340,290)">

    <!-- Teal pentagon -->
    <polygon
      points="-30,-148 122,-62 138,82 -18,158 -148,40"
      fill="none" stroke="#1d6b5c" stroke-width="14"/>

    <!-- Teal diagonals -->
    <line x1="-30" y1="-148" x2="138" y2="82"  fill="none" stroke="#1d6b5c" stroke-width="9" opacity="0.65"/>
    <line x1="122"  y1="-62"  x2="-18"  y2="158" fill="none" stroke="#1d6b5c" stroke-width="9" opacity="0.65"/>
    <line x1="-148" y1="40"   x2="122"  y2="-62" fill="none" stroke="#1d6b5c" stroke-width="9" opacity="0.65"/>

    <!-- Gold hexagon -->
    <polygon
      points="88,-155 195,-55 172,90 42,178 -105,138 -118,-28"
      fill="none" stroke="#c8a84b" stroke-width="14"/>

    <!-- Gold diagonals -->
    <line x1="88"   y1="-155" x2="42"   y2="178"  fill="none" stroke="#c8a84b" stroke-width="9" opacity="0.65"/>
    <line x1="-118" y1="-28"  x2="172"  y2="90"   fill="none" stroke="#c8a84b" stroke-width="9" opacity="0.65"/>

    <!-- Teal vertices -->
    <circle cx="-30"  cy="-148" r="20" fill="#1d6b5c"/>
    <circle cx="122"  cy="-62"  r="20" fill="#1d6b5c"/>
    <circle cx="138"  cy="82"   r="20" fill="#1d6b5c"/>
    <circle cx="-18"  cy="158"  r="20" fill="#1d6b5c"/>
    <circle cx="-148" cy="40"   r="20" fill="#1d6b5c"/>

    <!-- Gold vertices -->
    <circle cx="88"   cy="-155" r="17" fill="#c8a84b"/>
    <circle cx="195"  cy="-55"  r="17" fill="#c8a84b"/>
    <circle cx="172"  cy="90"   r="17" fill="#c8a84b"/>
    <circle cx="42"   cy="178"  r="17" fill="#c8a84b"/>
    <circle cx="-105" cy="138"  r="17" fill="#c8a84b"/>
    <circle cx="-118" cy="-28"  r="17" fill="#c8a84b"/>

  </g>
</svg>
